# このワークフローの表示名。
# GitHub Actions の画面で「CodeQL」という名前で表示される。
name: CodeQL

# このワークフローをどのイベントで起動するかを定義する。
on:
  push:
    # デフォルトブランチ main への push で実行する。
    # マージ後の確定状態に対する解析結果を継続的に残すためのトリガー。
    # push 対象ブランチを広げすぎると、作業途中の短命ブランチや細かい更新でも
    # 毎回重い解析が走りやすく、運用コストやノイズが増えやすい。
    # そのため、雛形としてはまず main のみに絞った最小構成にしている。
    branches: [ "main" ]
  pull_request:
    # main 向けの Pull Request でも実行する。
    # 変更を main に取り込む前に問題へ気付けるようにするため、
    # 実運用ではこのトリガーを入れるのが一般的。
    # ここでも対象を main 向け PR のみに絞り、重要なマージ経路を監視対象にする。
    branches: [ "main" ]
  schedule:
    # 定期実行も入れておく。
    # コード変更がなくても、CodeQL 側の検出ロジック更新や
    # 依存関係・周辺知見の変化を反映した再解析ができる。
    # GitHub Actions の schedule に指定できるのは cron のみ。
    # 毎日 20:00 UTC（JSTでは 5:00）に実行。
    - cron: '0 20 * * *'

# 実行するジョブ一覧。
jobs:
  # ジョブID。任意の名前を付けられるが、ここでは analyze（解析）としている。
  analyze:
    # GitHub が用意する Ubuntu 環境でジョブを動かす。
    runs-on: ubuntu-latest

    # このジョブに与える権限を最小限に絞って定義する。
    permissions:
      # CodeQL の解析結果を GitHub の Code scanning alerts に送信するために必要。
      security-events: write

      # リポジトリのソースコードを読み取るために必要。
      contents: read

    # ジョブの中で順番に実行する処理。
    steps:

      # リポジトリの内容を runner にチェックアウトする。
      # これをしないと、後続ステップでソースコードを参照できない。
      - uses: actions/checkout@v4

      # Java 実行環境をセットアップする。
      # Java / Kotlin プロジェクトのビルドや CodeQL 解析の前提になる。
      - uses: actions/setup-java@v4
        with:
          # 利用する JDK ディストリビューション。
          # temurin は Eclipse Temurin（よく使われる OpenJDK 系ディストリビューション）。
          distribution: temurin

          # 使用する Java のバージョン。
          # このプロジェクトは Java 17 前提でビルド・解析する想定。
          java-version: 17

      # 共通ビルドスクリプトが gradle コマンドを使えるようにする。
      - uses: gradle/actions/setup-gradle@v4

      # CodeQL を初期化するステップ。
      # ここで解析対象言語などを設定する。
      - uses: github/codeql-action/init@v3
        with:
          # 解析対象の言語。
          # Java と Kotlin を含むプロジェクト向け。
          languages: java-kotlin

      # プロジェクトを Gradle でビルドする。
      # Java/Kotlin の CodeQL では、ビルドによって得られる情報
      # （例：完全な型解決、依存ライブラリのクラスパス、アノテーションやフレームワークの意味解析、etc.）
      # を使ってより正確に解析するため、このステップが重要。
      # Dockerfileと共通のスクリプトを呼んでビルドする。ビルド手順の複数箇所分散を防止。
      - run: ./scripts/build-app.sh

      # CodeQL 解析を実行し、結果を GitHub にアップロードする。
      # 実行後、結果は Security タブや Code scanning alerts で確認できる。
      - uses: github/codeql-action/analyze@v3
