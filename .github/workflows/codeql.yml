# このワークフローの表示名。
# GitHub Actions の画面で「CodeQL」という名前で表示。
name: CodeQL

# このワークフローをどのイベントで起動するかを定義する。
on:
  push:
    # デフォルトブランチ main への push で実行する。
    # マージ後の確定状態に対する解析結果を継続的に残すためのトリガー。
    # push 対象ブランチを広げすぎると、作業途中の短命ブランチや細かい更新でも
    # 毎回重い解析が走りやすく、運用コストやノイズが増えやすい。
    # そのため、雛形としてはまず main のみに絞った最小構成にしている。
    branches: [ "main" ]
  pull_request:
    # main 向けの Pull Request でも実行する。
    # 変更を main に取り込む前に問題へ気付けるようにするため、
    # 実運用ではこのトリガーを入れるのが一般的。
    # ここでも対象を main 向け PR のみに絞り、重要なマージ経路を監視対象にする。
    branches: [ "main" ]
  schedule:
    # 定期実行も入れておく。
    # コード変更がなくても、CodeQL 側の検出ロジック更新や
    # 依存関係・周辺知見の変化を反映した再解析ができる。
    # schedule は GitHub Actions の仕様上、デフォルトブランチ
    # （このリポジトリでは main）の最新コミットを対象に実行される。
    # GitHub Actions の schedule に指定できるのは cron のみ。
    # 毎日 20:00 UTC（JSTでは 5:00）に実行。
    - cron: '0 20 * * *'

jobs:
  analyze:
    # reusable workflow にも同等の権限を要求させているが、
    # 呼び出し元でも必要最小限の権限を明示しておく。
    permissions:
      security-events: write
      contents: read
    # 共通ワークフローを参照する。
    uses: shusatoo/security-workflows/.github/workflows/codeql-java-gradle.yml@v1.0
    with:
      # このリポジトリでは Java 17 でビルド・解析する。
      java-version: '17'
      # このリポジトリは Kotlin を含むため、java-kotlin を明示する。
      codeql-language: java-kotlin
      # このリポジトリの Gradle ビルド手順をそのまま指定する。
      build-command: ./gradlew clean bootJar --no-daemon
